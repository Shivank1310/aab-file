name: Build AAB Demo

on:
  push:
    branches: [ main ]

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache pnpm
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    # ⭐ Auto Version Bump + Git Push
    - name: Bump Version Code
      run: |
        OLD=$(grep "versionCode " android/app/build.gradle | grep -o '[0-9]*')
        NEW=$((OLD + 1))
        sed -i "s/versionCode $OLD/versionCode $NEW/" android/app/build.gradle
        echo "Version $OLD → $NEW ✅"

        # Git mein save karo
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add android/app/build.gradle
        git commit -m "chore: bump versionCode $OLD → $NEW"
        git push

    # ⭐ Debug AAB Build (No Keystore needed!)
    - name: Build Debug AAB
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleDebug

    # ⭐ Pehli wali delete, nai upload karo
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-v${{ github.run_number }}
        path: android/app/build/outputs/bundle/debug/app-debug.aab
        retention-days: 1    # ← 1 din baad auto delete ✅
